<h3>2. Assign Tag-to-Audio Mapping</h3>
<p>Assign a scanned NFC Tag ID to an uploaded audio track configuration.</p>
<form action="{{ url_for('map_tag') }}" method="POST" style="margin: 20px 0; padding: 15px; border: 1px solid #e2e8f0; background: #fff; border-radius: 6px;">
    <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom:5px;"><b>NFC Tag ID:</b></label>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="tag_id_input" name="tag_id" required placeholder="Scan or enter tag ID" style="padding: 8px; width: 250px;">
            <button type="button" id="scan_btn" onclick="startNfcScan()" style="padding: 8px 15px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;">
                Scan Physical Tag
            </button>
        </div>
        <span id="scan_status" style="display: block; margin-top: 5px; font-size: 0.9em; color: #64748b;"></span>
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom:5px;"><b>Select Audio Track:</b></label>
        <select name="filename" required style="padding: 8px; width: 266px;">
            <option value="">-- Choose an uploaded file --</option>
            {% for file in files %}
                <option value="{{ file }}">{{ file }}</option>
            {% endfor %}
        </select>
    </div>
    
    <button type="submit" class="action-btn">Save Mapping</button>
</form>

<script>
let pollInterval = null;

function startNfcScan() {
    const btn = document.getElementById('scan_btn');
    const statusText = document.getElementById('scan_status');
    
    btn.disabled = true;
    btn.style.background = '#94a3b8';
    statusText.innerText = "Waiting for NFC card tap... Go scan your tag now!";
    statusText.style.color = "#ea580c";

    // Tell backend to start watching for a scan
    fetch('/api/start-scan', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            // Start checking every 500ms for a result
            pollInterval = setInterval(checkForScan, 500);
        })
        .catch(err => {
            console.error("Error starting scan:", err);
            resetScanButton();
        });
}

function checkForScan() {
    fetch('/api/check-scan')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'found') {
                // Populate input field with the captured Tag ID
                document.getElementById('tag_id_input').value = data.tag_id;
                
                // Clear polling and reset UI
                clearInterval(pollInterval);
                resetScanButton("Tag captured successfully!", "#16a34a");
            }
        })
        .catch(err => console.error("Error checking scan:", err));
}

function resetScanButton(message = "", color = "#64748b") {
    const btn = document.getElementById('scan_btn');
    const statusText = document.getElementById('scan_status');
    
    btn.disabled = false;
    btn.style.background = '#3b82f6';
    statusText.innerText = message;
    statusText.style.color = color;
}
</script>
